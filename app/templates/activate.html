<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate Your Tag</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 400px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
    .tabs { display: flex; border-bottom: 1px solid #eee; margin-bottom: 24px; }
    .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: #888; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #000; border-bottom-color: #000; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #444; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
    input:focus { border-color: #000; }
    button { width: 100%; padding: 13px; background: #000; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    button:hover { background: #333; }
    .error { color: #e53e3e; font-size: 13px; margin-top: 10px; display: none; }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Activate Your Tag</h1>
    <p class="subtitle">Create an account or log in to claim this tag.</p>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('register')">Register</div>
      <div class="tab" onclick="switchTab('login')">Log In</div>
    </div>

    <!-- 注册 -->
    <div class="panel active" id="panel-register">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 characters">
      </div>
      <button onclick="register()">Create Account & Activate</button>
      <p class="error" id="reg-error"></p>
    </div>

    <!-- 登录 -->
    <div class="panel" id="panel-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Your password">
      </div>
      <button onclick="login()">Log In & Activate</button>
      <p class="error" id="login-error"></p>
    </div>
  </div>

  <script>
    const TAG_ID = "{{ tag_id }}";

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab:${tab === 'register' ? 'first-child' : 'last-child'}`).classList.add('active');
      document.getElementById(`panel-${tab}`).classList.add('active');
    }

    async function register() {
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const err = document.getElementById('reg-error');
      err.style.display = 'none';
      const res = await fetch('/users/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (res.ok) {
        await bindTag();
      } else {
        const data = await res.json();
        err.textContent = data.detail;
        err.style.display = 'block';
      }
    }

    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const err = document.getElementById('login-error');
      err.style.display = 'none';
      const res = await fetch('/users/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (res.ok) {
        await bindTag();
      } else {
        const data = await res.json();
        err.textContent = data.detail;
        err.style.display = 'block';
      }
    }

    async function bindTag() {
      await fetch(`/tags/bind/${TAG_ID}`, { method: 'POST' });
      window.location.href = `/dashboard/${TAG_ID}`;
    }
  </script>
</body>
</html>
