<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – TapTag</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
    nav { background: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
    .nav-logo { font-weight: 700; font-size: 16px; }
    .nav-right { display: flex; gap: 12px; align-items: center; }
    .btn-logout { font-size: 13px; color: #888; cursor: pointer; background: none; border: none; }
    .container { max-width: 560px; margin: 0 auto; padding: 32px 20px; }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .tag-id { font-size: 12px; color: #aaa; font-family: monospace; margin-top: -14px; margin-bottom: 20px; }

    /* 链接列表 */
    .link-list { margin-bottom: 24px; }
    .link-item { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: grab; }
    .link-item:active { cursor: grabbing; }
    .drag-handle { color: #ccc; font-size: 18px; user-select: none; }
    .link-info { flex: 1; min-width: 0; }
    .link-label { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-url { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-delete { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 4px; }
    .btn-delete:hover { color: #e53e3e; }

    /* 添加链接表单 */
    .add-form { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .add-form h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #000; }
    .btn-add { width: 100%; padding: 11px; background: #000; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .btn-add:hover { background: #333; }
    .empty { color: #bbb; font-size: 14px; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-logo">TapTag</span>
    <div class="nav-right">
      <a href="/my-tags" style="font-size:13px;color:#888;text-decoration:none;margin-right:16px;">My Tags</a>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="container">
    <h2>My Links</h2>
    <p class="tag-id">Tag ID: {{ tag_id }}</p>

    <!-- 模式切换 -->
    <div style="background:white;border-radius:12px;padding:16px 20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:14px;font-weight:600;" id="mode-label">Mode: Direct</div>
        <div style="font-size:12px;color:#aaa;" id="mode-desc">Tap → goes straight to first link</div>
      </div>
      <div onclick="toggleMode()" id="toggle-btn" style="width:44px;height:24px;background:#ccc;border-radius:24px;cursor:pointer;position:relative;transition:.3s;">
        <div id="toggle-thumb" style="position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:.3s;"></div>
      </div>
    </div>

    <div class="link-list" id="link-list">
      <!-- 链接由 JS 渲染 -->
    </div>

    <div class="add-form">
      <h3>Add a Link</h3>
      <div class="form-group">
        <label>Label</label>
        <input type="text" id="new-label" placeholder="e.g. My Instagram">
      </div>
      <div class="form-group">
        <label>URL</label>
        <input type="url" id="new-url" placeholder="https://...">
      </div>
      <button class="btn-add" onclick="addLink()">Add Link</button>
    </div>
  </div>

  <script>
    const TAG_ID = "{{ tag_id }}";
    let links = [];
    let currentMode = "DIRECT";

    async function loadMode() {
      const res = await fetch(`/tags/my`);
      const tags = await res.json();
      const tag = tags.find(t => t.id === TAG_ID);
      if (tag) setMode(tag.mode || "DIRECT");
    }

    function setMode(mode) {
      currentMode = mode;
      const isDisplay = mode === "DISPLAY";
      document.getElementById('toggle-btn').style.background = isDisplay ? '#000' : '#ccc';
      document.getElementById('toggle-thumb').style.left = isDisplay ? '23px' : '3px';
      document.getElementById('mode-label').textContent = isDisplay ? 'Mode: Display' : 'Mode: Direct';
      document.getElementById('mode-desc').textContent = isDisplay ? 'Tap → shows all links' : 'Tap → goes straight to first link';
    }

    async function toggleMode() {
      const newMode = currentMode === "DIRECT" ? "DISPLAY" : "DIRECT";
      await fetch(`/tags/${TAG_ID}/mode`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: newMode })
      });
      setMode(newMode);
    }

    async function loadLinks() {
      const res = await fetch(`/links/${TAG_ID}`);
      if (res.status === 401) { window.location.href = `/activate?id=${TAG_ID}`; return; }
      links = await res.json();
      renderLinks();
    }

    function renderLinks() {
      const list = document.getElementById('link-list');
      if (links.length === 0) {
        list.innerHTML = '<p class="empty">No links yet. Add one below.</p>';
        return;
      }
      list.innerHTML = links.map(l => `
        <div class="link-item" data-id="${l.id}">
          <span class="drag-handle">⠿</span>
          <div class="link-info">
            <div class="link-label">${l.label}</div>
            <div class="link-url">${l.url}</div>
          </div>
          <button class="btn-delete" onclick="deleteLink(${l.id})">✕</button>
        </div>
      `).join('');

      // 初始化拖拽排序
      Sortable.create(list, {
        animation: 150,
        handle: '.drag-handle',
        onEnd: async () => {
          const items = list.querySelectorAll('.link-item');
          const ids = Array.from(items).map(el => parseInt(el.dataset.id));
          await fetch(`/links/${TAG_ID}/reorder`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ link_ids: ids })
          });
        }
      });
    }

    async function addLink() {
      const label = document.getElementById('new-label').value.trim();
      const url = document.getElementById('new-url').value.trim();
      if (!label || !url) return;
      await fetch(`/links/${TAG_ID}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ label, url })
      });
      document.getElementById('new-label').value = '';
      document.getElementById('new-url').value = '';
      loadLinks();
    }

    async function deleteLink(id) {
      if (!confirm('Delete this link?')) return;
      await fetch(`/links/${TAG_ID}/${id}`, { method: 'DELETE' });
      loadLinks();
    }

    async function logout() {
      await fetch('/users/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    loadLinks();
    loadMode();
  </script>
</body>
</html>
